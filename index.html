<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NS Toolkit Access</title>
<link rel="icon" type="image/jpg" href="https://i.imgur.com/7xDufQI.jpeg">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial; }

/* Dark background */
body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0d0d0d;
  overflow: hidden;
  position: relative;
}

/* Canvas for particles */
#particles {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* Login box */
.login-box {
  position: relative;
  z-index: 1; /* above particles */
  width: 360px; 
  padding: 40px; 
  background: #1b1b1b; 
  border-radius: 15px;
  text-align: center; 
  box-shadow: 0 0 25px rgba(0,255,255,0.3);
}

.login-box h2{
  color: #00ffff; 
  margin-bottom: 25px; 
  text-shadow: 0 0 10px #00ffff;
}

.login-box input{
  width: 100%; 
  padding: 12px; 
  border-radius: 6px; 
  border: none; 
  margin-bottom: 20px; 
  font-size: 14px;
}

.login-box button{
  width: 100%; 
  padding: 12px; 
  border: none; 
  border-radius: 6px; 
  background: #19d3d3;
  color: #000; 
  font-weight: bold; 
  cursor: pointer; 
  font-size: 15px; 
  transition: 0.2s;
}

.login-box button:hover{ background:#12bcbc; }
.login-box button:disabled{ opacity:0.5; cursor:not-allowed; }

#status{
  margin-top:12px; 
  font-weight:bold; 
  display:block; 
  min-height:24px;
  font-family: 'Courier New', monospace; 
  font-size:14px; 
  text-align:center;
}

.success{ color:#00ff9c; text-shadow: 0 0 6px #00ff9c; }
.error{ color:#ff4d4d; text-shadow: 0 0 6px #ff4d4d; }

.slack-contact{
  margin-top:15px; 
  font-size:13px; 
  color:#00ffff; 
  text-shadow: 0 0 4px #00ffff;
  text-align:center; 
}

.slack-contact a{
  color:#00ffff; 
  text-decoration:underline;
}

.slack-contact span{
  white-space: nowrap; 
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="login-box">
  <h2>NS Toolkit Access</h2>

  <input type="password" id="password" placeholder="Enter Access Code" onkeypress="if(event.key==='Enter') login()">
  <button id="loginBtn" onclick="login()">Enter</button>
  <p id="status"></p>

  <p class="slack-contact">
    Contact us on Slack: 
    <span>
      Darel Miranda | Morvan Hsu
    </span>
  </p>
</div>

<script>
// Particle animation
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];
const PARTICLE_COUNT = 80;

class Particle {
  constructor(){
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 3 + 1;
    this.speedY = Math.random() * 1 + 0.5;
    this.color = 'rgba(0,255,255,0.5)';
  }
  update(){
    this.y += this.speedY;
    if(this.y > canvas.height){
      this.y = 0;
      this.x = Math.random() * canvas.width;
    }
  }
  draw(){
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fill();
  }
}

function initParticles(){
  particlesArray = [];
  for(let i=0;i<PARTICLE_COUNT;i++){
    particlesArray.push(new Particle());
  }
}

function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particlesArray.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}

window.addEventListener('resize',()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  initParticles();
});

initParticles();
animateParticles();
</script>

<script>
// Existing login script
const HASH_PARTS=["6f8f75d7fe39a8fd","c33cf70125dea56b","9fd10e8f2486afbd","ae9b43ffca612f60"];
const PASSWORD_HASH=HASH_PARTS.join("");
const MAX_ATTEMPTS=3;
const COOLDOWN=5*60*1000;

async function sha256(text){
  const encoder=new TextEncoder();
  const data=encoder.encode(text);
  const hashBuffer=await crypto.subtle.digest("SHA-256",data);
  return Array.from(new Uint8Array(hashBuffer)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

function safeCompare(a,b){ if(a.length!==b.length) return false; let r=0; for(let i=0;i<a.length;i++){ r|=a.charCodeAt(i)^b.charCodeAt(i); } return r===0; }

function getAttempts(){ return parseInt(localStorage.getItem("ns_attempts"))||0; }
function setAttempts(v){ localStorage.setItem("ns_attempts",v); }
function setLock(){ localStorage.setItem("ns_lock",Date.now()+COOLDOWN); }
function getLock(){ return parseInt(localStorage.getItem("ns_lock"))||0; }

function cooldown(){
  const lock=getLock();
  const status=document.getElementById("status");
  if(!lock) return;
  let remaining=lock-Date.now();
  if(remaining<=0){ localStorage.removeItem("ns_lock"); localStorage.removeItem("ns_attempts"); document.getElementById("loginBtn").disabled=false; status.innerText=''; return; }
  status.className="error"; status.innerText="Too many attempts. Try again in "+Math.ceil(remaining/1000)+"s";
  document.getElementById("loginBtn").disabled=true;
  requestAnimationFrame(cooldown);
}

async function login(){
  const lock=getLock();
  const status=document.getElementById("status");
  if(lock && Date.now()<lock){ cooldown(); return; }
  const input=document.getElementById("password").value;
  const hash=await sha256(input);
  if(safeCompare(hash,PASSWORD_HASH)){
    document.getElementById("loginBtn").disabled=true;
    sessionStorage.setItem("ns_access","granted");
    localStorage.removeItem("ns_attempts");
    await showSuccessSequence();
    window.location.href="main.html";
  } else{
    let attempts=getAttempts()+1;
    setAttempts(attempts);
    status.className="error";
    if(attempts>=MAX_ATTEMPTS){ setLock(); cooldown(); } 
    else{ status.innerText="Incorrect Code ("+attempts+"/3)"; }
  }
}

async function showSuccessSequence(){
  const status=document.getElementById("status");
  const messages=["Checking code...","✔ Verified","Opening NS Toolkit..."];
  status.className="success";
  for(let msg of messages){
    await typeEffect(status,msg,50);
    await delay(700);
    status.innerHTML=''; 
  }
}

function typeEffect(el,text,speed){
  return new Promise(resolve=>{
    let i=0;
    const interval=setInterval(()=>{
      el.innerHTML=text.slice(0,i+1).replace(/ /g,'&nbsp;');
      i++;
      if(i>=text.length){ clearInterval(interval); resolve(); }
    },speed);
  });
}

function delay(ms){ return new Promise(res=>setTimeout(res,ms)); }

cooldown();
</script>

  if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {

    return false;
  }
});

document.addEventListener("keydown", function(e) {

  }
});
// Optional: Disable right-click
document.addEventListener("contextmenu", e => e.preventDefault());
</script>
  <script>
// Session & auto-logout management
const IDLE_LIMIT = 60 * 60 * 1000; // 1 hour
const SESSION_LIMIT = 8 * 60 * 60 * 1000; // 8 hours

// Update last activity timestamp on any user interaction
function updateActivity() {
    if (sessionStorage.getItem("ns_access") === "granted") {
        sessionStorage.setItem("ns_lastActivity", Date.now());
    }
}
["mousemove", "keydown", "click", "scroll", "touchstart"].forEach(evt => {
    document.addEventListener(evt, updateActivity);
});

// Check session expiration periodically
setInterval(() => {
    if (sessionStorage.getItem("ns_access") === "granted") {
        const now = Date.now();
        const loginTime = parseInt(sessionStorage.getItem("ns_loginTime")) || now;
        const lastActivity = parseInt(sessionStorage.getItem("ns_lastActivity")) || now;

        // Idle logout
        if (now - lastActivity > IDLE_LIMIT) {
            sessionStorage.removeItem("ns_access");
            sessionStorage.removeItem("ns_loginTime");
            sessionStorage.removeItem("ns_lastActivity");
            alert("You have been logged out due to 1 hour of inactivity. Please enter the access code again.");
            window.location.reload();
        }

        // Max session logout
        if (now - loginTime > SESSION_LIMIT) {
            sessionStorage.removeItem("ns_access");
            sessionStorage.removeItem("ns_loginTime");
            sessionStorage.removeItem("ns_lastActivity");
            alert("Your session has expired after 8 hours. Please enter the access code again.");
            window.location.reload();
        }
    }
}, 30 * 1000); // Check every 30 seconds

// On successful login, store session start and last activity
async function login(){
  const lock=getLock();
  const status=document.getElementById("status");
  if(lock && Date.now()<lock){ cooldown(); return; }
  const input=document.getElementById("password").value;
  const hash=await sha256(input);
  if(safeCompare(hash,PASSWORD_HASH)){
    document.getElementById("loginBtn").disabled=true;
    sessionStorage.setItem("ns_access","granted");
    sessionStorage.setItem("ns_loginTime", Date.now());
    sessionStorage.setItem("ns_lastActivity", Date.now());
    localStorage.removeItem("ns_attempts");
    await showSuccessSequence();
    window.location.href="main.html";
  } else{
    let attempts=getAttempts()+1;
    setAttempts(attempts);
    status.className="error";
    if(attempts>=MAX_ATTEMPTS){ setLock(); cooldown(); } 
    else{ status.innerText="Incorrect Code ("+attempts+"/3)"; }
  }
}
</script>
