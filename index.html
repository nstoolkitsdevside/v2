<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NS Toolkit Access</title>

<link rel="icon" type="image/png" href="https://png.pngtree.com/png-clipart/20250104/original/pngtree-bright-blue-glitter-star-png-image_19604661.png">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0d0d0d;
}

/* LOGIN CARD */

.login-box{
width:360px;
padding:40px;
background:#1b1b1b;
border-radius:15px;
text-align:center;
box-shadow:0 0 25px rgba(0,255,255,0.3);
}

/* TITLE */

.login-box h2{
color:#00ffff;
margin-bottom:25px;
text-shadow:0 0 10px #00ffff;
}

/* INPUT */

.login-box input{
width:100%;
padding:12px;
border-radius:6px;
border:none;
margin-bottom:20px;
font-size:14px;
}

/* BUTTON */

.login-box button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#19d3d3;
color:#000;
font-weight:bold;
cursor:pointer;
font-size:15px;
transition:0.2s;
}

.login-box button:hover{
background:#12bcbc;
}

.error{
color:#ff4d4d;
margin-top:12px;
display:none;
}

</style>

</head>

<body>

<div class="login-box">

<h2>NS Toolkit Access</h2>

<input 
type="password" 
id="password" 
placeholder="Enter Access Code"
onkeypress="if(event.key==='Enter') login()"
>

<button onclick="login()">Enter</button>

<p id="error" class="error">Incorrect Code</p>

</div>

<script>

const HASHED_PASSWORD = "6f8f75d7fe39a8fdc33cf70125dea56b9fd10e8f2486afbdae9b43ffca612f60";

async function sha256(text){

const encoder = new TextEncoder();
const data = encoder.encode(text);

const hashBuffer = await crypto.subtle.digest("SHA-256", data);

const hashArray = Array.from(new Uint8Array(hashBuffer));

return hashArray.map(b => b.toString(16).padStart(2,"0")).join("");

}

async function login(){

const input = document.getElementById("password").value;

const inputHash = await sha256(input);

if(inputHash === HASHED_PASSWORD){

sessionStorage.setItem("ns_access","granted");

window.location.href="main.html";

}else{

document.getElementById("error").style.display="block";

}

}

</script>

</body>
</html>
