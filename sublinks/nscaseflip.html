<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NS CaseFlip</title>
<link rel="icon" type="image/png" href="https://png.pngtree.com/png-clipart/20250104/original/pngtree-bright-blue-glitter-star-png-image_19604661.png">
<style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        line-height: 1.6;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        transition: background 0.3s, color 0.3s;
        background: #f5f6fa;
        color: #333;
    }

    body.dark-mode {
        background: #111;
        color: #ccc;
    }

    /* Header */
    header {
        background: linear-gradient(90deg, #4e54c8, #8f94fb);
        color: white;
        padding: 1rem 2rem;
        position: sticky;
        top: 0;
        z-index: 1000;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        transition: background 0.3s;
    }

    body.dark-mode header {
        background: linear-gradient(90deg, #222, #444);
    }

    header h1 { font-size: 1.8rem; }

    /* Dark/Light toggle button */
    #modeToggle {
        cursor: pointer;
        background: #fff;
        color: #333;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        font-weight: bold;
        transition: background 0.3s, color 0.3s;
    }

    body.dark-mode #modeToggle {
        background: #333;
        color: #0ff;
    }

    main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem;
        transition: background 0.3s, color 0.3s;
    }

    .credits-subtext {
        margin-bottom: 20px;
        max-width: 600px;
        text-align: center;
    }

    /* Buttons Area */
    .button-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin-bottom: 30px;
    }

    .buttons {
        padding: 10px 18px;
        font-size: 13px;
        font-weight: bold;
        border: none;
        border-radius: 6px;
        background: #007BFF;
        color: white;
        cursor: pointer;
        transition: all .25s ease;
    }

    .buttons:hover { transform: translateY(-2px); opacity: 0.9; }

    /* FIXED BOX STYLING (MATCHING IMAGE 1) */
    .editor-container {
        width: 100%;
        max-width: 1000px;
        background: #e9e9e9; /* Light gray outer box */
        border: 1px solid #d1d1d1;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    body.dark-mode .editor-container {
        background: #1e1e1e;
        border-color: #333;
    }

    .counter-wrapper {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-bottom: 15px;
    }

    .counter-box {
        background: #fff;
        padding: 4px 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 12px;
        color: #555;
        font-family: monospace;
    }

    body.dark-mode .counter-box {
        background: #2d2d2d;
        color: #0ff;
        border-color: #444;
    }

    .inputarea {
        width: 100%;
        height: 400px;
        box-sizing: border-box;
        font-size: 1.1rem;
        border-radius: 8px;
        padding: 20px;
        background: #f9f9f9; /* Slightly off-white inner */
        border: 1px solid #ccc;
        outline: none;
        resize: vertical;
        color: #333;
        font-family: 'Courier New', Courier, monospace;
    }

    body.dark-mode .inputarea {
        background: #121212;
        color: #ddd;
        border-color: #444;
    }

    /* Footer */
    footer {
        background: #222;
        color: #ccc;
        text-align: center;
        padding: 1rem;
        width: 100%;
    }

    @keyframes highlightAnim{
        0% { background:#007BFF; color:white; }
        100% { background:#fff; color:#555; }
    }
    .counter-box.animate { animation: highlightAnim 0.6s ease; }
nav a { color: white; text-decoration: none; margin-left: 1.5rem; font-weight: 500; position: relative; } nav a::after { content: ''; display: block; height: 2px; background: white; width: 0%; transition: 0.3s; position: absolute; bottom: -4px; left: 0; } nav a:hover::after { width: 100%; }

</style>
</head>
<body>

<header>
    <h1>NS Toolkits</h1>
    <nav>
<a href="https://nstoolkits.site/main.html">Home</a>
    </nav>
    <button id="modeToggle">🌙 Dark Mode</button>
</header>

<main>
    <h2 style="margin-bottom:10px;">NS CaseFlip</h2>
    <p class="credits-subtext">
        A tool may ease the work, but it cannot replace the craftsman.
    </p>

    <div class="button-container">
        <button class="buttons" id="upperBtn">UPPER CASE</button>
        <button class="buttons" id="lowerBtn">lower case</button>
        <button class="buttons" id="sentenceBtn">Sentence case</button>
        <button class="buttons" id="capitalizedBtn">Capitalized Case</button>
        <button class="buttons" id="altBtn">aLtErNaTiNg</button>
        <button class="buttons" id="copyBtn">COPY</button>
        <button class="buttons" id="clearBtn">CLEAR</button>
    </div>

    <div class="editor-container">
        <div class="counter-wrapper">
            <div class="counter-box" id="char-count">Characters: 0</div>
            <div class="counter-box" id="word-count">Words: 0</div>
            <div class="counter-box" id="line-count">Lines: 0</div>
        </div>
        <textarea id="text-input" class="inputarea" placeholder="Type or paste your text here..."></textarea>
    </div>
</main>

<footer id="footer">
    &copy; 2026 NS Tool Kits | Made by Morvan Hsu and Darel Miranda
</footer>

<script>
const textarea = document.getElementById("text-input");
const charBox = document.getElementById("char-count");
const wordBox = document.getElementById("word-count");
const lineBox = document.getElementById("line-count");
const modeBtn = document.getElementById('modeToggle');

let prevChars = 0, prevWords = 0, prevLines = 0;

function animateBox(box){
    box.classList.remove("animate"); 
    void box.offsetWidth; 
    box.classList.add("animate");
}

function updateCounter(){
    const text = textarea.value;
    const chars = text.length;
    const words = text.trim() === "" ? 0 : text.trim().split(/\s+/).length;
    const lines = text.trim() === "" ? 0 : text.split(/\r\n|\r|\n/).length;

    if(chars > prevChars) animateBox(charBox);
    if(words > prevWords) animateBox(wordBox);
    if(lines > prevLines) animateBox(lineBox);

    prevChars = chars; prevWords = words; prevLines = lines;

    charBox.innerText = `Characters: ${chars}`;
    wordBox.innerText = `Words: ${words}`;
    lineBox.innerText = `Lines: ${lines}`;
}

textarea.addEventListener("input", updateCounter);

// Case functions
function toUpper(){ textarea.value = textarea.value.toUpperCase(); updateCounter(); }
function toLower(){ textarea.value = textarea.value.toLowerCase(); updateCounter(); }
function toSentence(){ 
    let t = textarea.value.toLowerCase(); 
    textarea.value = t.charAt(0).toUpperCase() + t.slice(1); 
    updateCounter(); 
}
function toCapitalized(){ 
    textarea.value = textarea.value.replace(/\b\w/g,c=>c.toUpperCase()); 
    updateCounter(); 
}
function toAlternating(){ 
    let t=textarea.value,r=""; 
    for(let i=0;i<t.length;i++){ 
        r += i%2===0 ? t[i].toLowerCase() : t[i].toUpperCase(); 
    } 
    textarea.value=r; 
    updateCounter(); 
}

function copyText() {
    if (!textarea.value) return;
    const copyBtn = document.getElementById("copyBtn");
    navigator.clipboard.writeText(textarea.value).then(() => {
        const originalText = copyBtn.innerText;
        copyBtn.innerText = "Copied!";
        setTimeout(() => copyBtn.innerText = originalText, 1500);
    });
}

function clearText() {
    textarea.value = "";
    updateCounter();
}

document.getElementById("upperBtn").onclick = toUpper;
document.getElementById("lowerBtn").onclick = toLower;
document.getElementById("sentenceBtn").onclick = toSentence;
document.getElementById("capitalizedBtn").onclick = toCapitalized;
document.getElementById("altBtn").onclick = toAlternating;
document.getElementById("copyBtn").onclick = copyText;
document.getElementById("clearBtn").onclick = clearText;

modeBtn.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
    modeBtn.textContent = document.body.classList.contains('dark-mode') ? '☀️ Light Mode' : '🌙 Dark Mode';
});

updateCounter();
</script>
</body>
</html>
