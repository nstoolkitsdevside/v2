<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NS CaseFlip</title>
<link rel="icon" type="image/jpg" href="https://i.imgur.com/7xDufQI.jpeg">
<style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        line-height: 1.6;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        transition: background 0.3s, color 0.3s;
        background: #f5f6fa;
        color: #333;
    }

    body.dark-mode {
        background: #111;
        color: #ccc;
    }

    /* Header */

    /* Header */
    header {
    background: linear-gradient(90deg, #4e54c8, #8f94fb);
    color: white;
    padding: 1rem 2rem;
    position: sticky;
    top: 0;
    z-index: 1000;
    display: grid; /* Use grid for more precise positioning */
    grid-template-columns: 1fr auto 1fr; /* Creates three columns: left, center, right */
    align-items: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}


    body.dark-mode header {
        background: linear-gradient(90deg, #222, #444);
    }

    header h1 { font-size: 1.8rem; }

    /* Dark/Light toggle button */
    #modeToggle {
        cursor: pointer;
        background: #fff;
        color: #333;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        font-weight: bold;
        transition: background 0.3s, color 0.3s;
    }

    body.dark-mode #modeToggle {
        background: #333;
        color: #0ff;
    }

    main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem;
        transition: background 0.3s, color 0.3s;
    }

    .credits-subtext {
        margin-bottom: 20px;
        max-width: 600px;
        text-align: center;
    }

    /* Buttons Area */
    .button-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin-bottom: 30px;
    }

    .buttons {
        padding: 10px 18px;
        font-size: 13px;
        font-weight: bold;
        border: none;
        border-radius: 6px;
        background: #007BFF;
        color: white;
        cursor: pointer;
        transition: all .25s ease;
    }

    .buttons:hover { transform: translateY(-2px); opacity: 0.9; }

    /* FIXED BOX STYLING (MATCHING IMAGE 1) */
    .editor-container {
        width: 100%;
        max-width: 1000px;
        background: #e9e9e9; /* Light gray outer box */
        border: 1px solid #d1d1d1;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    body.dark-mode .editor-container {
        background: #1e1e1e;
        border-color: #333;
    }

    .counter-wrapper {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-bottom: 15px;
    }

    .counter-box {
        background: #fff;
        padding: 4px 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 12px;
        color: #555;
        font-family: monospace;
    }

    body.dark-mode .counter-box {
        background: #2d2d2d;
        color: #0ff;
        border-color: #444;
    }

    .inputarea {
        width: 100%;
        height: 400px;
        box-sizing: border-box;
        font-size: 1.1rem;
        border-radius: 8px;
        padding: 20px;
        background: #f9f9f9; /* Slightly off-white inner */
        border: 1px solid #ccc;
        outline: none;
        resize: vertical;
        color: #333;
        font-family: 'Courier New', Courier, monospace;
    }

    body.dark-mode .inputarea {
        background: #121212;
        color: #ddd;
        border-color: #444;
    }

    /* Footer */
    footer {
        background: #222;
        color: #ccc;
        text-align: center;
        padding: 1rem;
        width: 100%;
    }

    @keyframes highlightAnim{
        0% { background:#007BFF; color:white; }
        100% { background:#fff; color:#555; }
    }
    .counter-box.animate { animation: highlightAnim 0.6s ease; }
/* 3. Force the Nav into the center column */
nav {
    grid-column: 2;
    display: flex;
    justify-content: center;
}

nav a {
    color: white;
    text-decoration: none;
    font-weight: 500;
    position: relative;
    margin: 0; /* Remove left margin since it's centered */
}

/* 4. Position the Toggle in the last column */
#modeToggle {
    grid-column: 3;
    justify-self: end; /* Push to the far right */
}
</style>
</head>
<body>

<header>
    <h1>NS Toolkits</h1>
    <nav>
<a href="https://nstoolkits.site/main.html">Home</a>
    </nav>
    <button id="modeToggle">🌙 Dark Mode</button>
</header>

<main>
    <h2 style="margin-bottom:10px;">NS CaseFlip</h2>
    <p class="credits-subtext">
        A tool may ease the work, but it cannot replace the craftsman.
    </p>

    <div class="button-container">
        <button class="buttons" id="upperBtn">UPPER CASE</button>
        <button class="buttons" id="lowerBtn">lower case</button>
        <button class="buttons" id="sentenceBtn">Sentence case</button>
        <button class="buttons" id="capitalizedBtn">Capitalized Case</button>
        <button class="buttons" id="altBtn">aLtErNaTiNg</button>
        <button class="buttons" id="copyBtn">COPY</button>
        <button class="buttons" id="clearBtn">CLEAR</button>
    </div>

    <div class="editor-container">
        <div class="counter-wrapper">
            <div class="counter-box" id="char-count">Characters: 0</div>
            <div class="counter-box" id="word-count">Words: 0</div>
            <div class="counter-box" id="line-count">Lines: 0</div>
        </div>
        <textarea id="text-input" class="inputarea" placeholder="Type or paste your text here..."></textarea>
    </div>
</main>

<footer id="footer">
    &copy; 2026 NS Tool Kits | Made by Morvan Hsu and Darel Miranda
</footer>

<script>
const textarea = document.getElementById("text-input");
const charBox = document.getElementById("char-count");
const wordBox = document.getElementById("word-count");
const lineBox = document.getElementById("line-count");
const modeBtn = document.getElementById('modeToggle');

let prevChars = 0, prevWords = 0, prevLines = 0;

function animateBox(box){
    box.classList.remove("animate"); 
    void box.offsetWidth; 
    box.classList.add("animate");
}

function updateCounter(){
    const text = textarea.value;
    const chars = text.length;
    const words = text.trim() === "" ? 0 : text.trim().split(/\s+/).length;
    const lines = text.trim() === "" ? 0 : text.split(/\r\n|\r|\n/).length;

    if(chars > prevChars) animateBox(charBox);
    if(words > prevWords) animateBox(wordBox);
    if(lines > prevLines) animateBox(lineBox);

    prevChars = chars; prevWords = words; prevLines = lines;

    charBox.innerText = `Characters: ${chars}`;
    wordBox.innerText = `Words: ${words}`;
    lineBox.innerText = `Lines: ${lines}`;
}

textarea.addEventListener("input", updateCounter);

// Case functions
function toUpper(){ textarea.value = textarea.value.toUpperCase(); updateCounter(); }
function toLower(){ textarea.value = textarea.value.toLowerCase(); updateCounter(); }
function toSentence() {
    let t = textarea.value.toLowerCase();
    // Capitalizes the first letter of the string and any letter following a period, exclamation, or question mark
    textarea.value = t.replace(/(^\s*\w|[.!?]\s*\w)/g, function(c) {
        return c.toUpperCase();
    });
    updateCounter();
}
function toCapitalized() {
    textarea.value = textarea.value
        .toLowerCase() // First, make everything lowercase
        .replace(/(^|\s)\S/g, l => l.toUpperCase()); // Capitalize every non-whitespace character that follows a space or starts the string
    updateCounter();
}
function toAlternating(){ 
    let t=textarea.value,r=""; 
    for(let i=0;i<t.length;i++){ 
        r += i%2===0 ? t[i].toLowerCase() : t[i].toUpperCase(); 
    } 
    textarea.value=r; 
    updateCounter(); 
}

function copyText() {
    if (!textarea.value) return;
    const copyBtn = document.getElementById("copyBtn");
    navigator.clipboard.writeText(textarea.value).then(() => {
        const originalText = copyBtn.innerText;
        copyBtn.innerText = "Copied!";
        setTimeout(() => copyBtn.innerText = originalText, 1500);
    });
}

function clearText() {
    textarea.value = "";
    updateCounter();
}

document.getElementById("upperBtn").onclick = toUpper;
document.getElementById("lowerBtn").onclick = toLower;
document.getElementById("sentenceBtn").onclick = toSentence;
document.getElementById("capitalizedBtn").onclick = toCapitalized;
document.getElementById("altBtn").onclick = toAlternating;
document.getElementById("copyBtn").onclick = copyText;
document.getElementById("clearBtn").onclick = clearText;

modeBtn.addEventListener('click', () => {
// Dark/Light Mode Toggle (WITH PERSISTENCE)
const modeBtn = document.getElementById('modeToggle');

// Load saved mode on refresh
if (localStorage.getItem('ns_theme') === 'dark') {
    document.body.classList.add('dark-mode');
    modeBtn.textContent = '☀️ Light Mode';
} else {
    modeBtn.textContent = '🌙 Dark Mode';
}

modeBtn.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');

    if (document.body.classList.contains('dark-mode')) {
        modeBtn.textContent = '☀️ Light Mode';
        localStorage.setItem('ns_theme', 'dark');
    } else {
        modeBtn.textContent = '🌙 Dark Mode';
        localStorage.setItem('ns_theme', 'light');
    }
});

updateCounter();
</script>
<script>
// =========================
// Session Check for Sublinks
// =========================
const IDLE_LIMIT = 60 * 60 * 1000;  // 1 hour
const SESSION_LIMIT = 8 * 60 * 60 * 1000; // 8 hours

// Function to check session
function checkSession() {
    const access = sessionStorage.getItem("ns_access");
    const loginTimeRaw = sessionStorage.getItem("ns_loginTime");
    const lastActivityRaw = sessionStorage.getItem("ns_lastActivity");
    const now = Date.now();

    // Not logged in
    if (!access) {
        alert("Please enter the access code first.");
        window.location.href = "https://nstoolkits.site/index.html";
        return;
    }

    const loginTime = loginTimeRaw ? parseInt(loginTimeRaw) : now;
    const lastActivity = lastActivityRaw ? parseInt(lastActivityRaw) : now;

    // Max session check (8 hours)
    if (now - loginTime > SESSION_LIMIT) {
        sessionStorage.clear();
        alert("Your session has expired after 8 hours.");
        window.location.href = "https://nstoolkits.site/index.html";
        return;
    }

    // Idle check (1 hour)
    if (now - lastActivity > IDLE_LIMIT) {
        sessionStorage.clear();
        alert("You have been logged out due to 1 hour of inactivity.");
        window.location.href = "https://nstoolkits.site/index.html";
        return;
    }

    // Update last activity timestamp on this page
    sessionStorage.setItem("ns_lastActivity", now);
}

// Run immediately
checkSession();

// Check periodically every 30 seconds
setInterval(checkSession, 30 * 1000);

// Also update lastActivity on any interaction
["mousemove","keydown","click","scroll","touchstart"].forEach(evt => {
    document.addEventListener(evt, () => {
        if (sessionStorage.getItem("ns_access") === "granted") {
            sessionStorage.setItem("ns_lastActivity", Date.now());
        }
    });
});
</script>
<script>
document.addEventListener("keydown", function(e) {
  // Block F12 and common shortcuts (Ctrl+Shift+I/J, Ctrl+U)
  if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
    e.preventDefault();
    return false;
  }
});

document.addEventListener("keydown", function(e) {
  if (e.ctrlKey && e.shiftKey && e.key === "C") {
    e.preventDefault();
  }
});
// Optional: Disable right-click
document.addEventListener("contextmenu", e => e.preventDefault());
</script>
</body>
</html>
